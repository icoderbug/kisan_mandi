<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Kisan Mandi</title>
  <link rel="stylesheet" href="css/output.css" />
  <link rel="stylesheet" href="css/toast.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- NAVBAR -->
  <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-100 bg-white">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center">
        <span class="text-white font-semibold text-sm">K</span>
      </div>
      <span class="text-base font-semibold text-gray-900">Kisan Mandi</span>
    </div>
    <a href="index.html" class="text-sm text-gray-500 hover:text-green-600 transition">← Back to home</a>
  </nav>

  <!-- MAIN -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="bg-white border border-gray-200 rounded-2xl w-full max-w-md overflow-hidden shadow-sm">

      <!-- TAB ROW -->
      <div class="p-7 pb-0">
        <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
          <button id="login-tab" onclick="switchTab('login')"
            class="flex-1 py-2 rounded-lg text-sm font-medium transition text-green-600 bg-white shadow-sm">
            Login
          </button>
          <button id="register-tab" onclick="switchTab('register')"
            class="flex-1 py-2 rounded-lg text-sm font-medium transition text-gray-500">
            Register
          </button>
        </div>

        <!-- ROLE SELECTION -->
        <p class="text-xs text-gray-500 mb-3 font-medium">Select your role</p>
        <div class="flex gap-3 mb-6">
          <button onclick="selectRole('farmer')" id="role-farmer"
            class="flex-1 border-2 border-green-500 bg-green-50 rounded-xl py-3 px-2 text-center transition cursor-pointer">
            <div class="text-2xl mb-1">🌾</div>
            <div class="text-xs font-semibold text-green-700">Farmer</div>
            <div class="text-xs text-gray-400 mt-0.5">List & sell crops</div>
          </button>
          <button onclick="selectRole('buyer')" id="role-buyer"
            class="flex-1 border-2 border-gray-200 bg-white rounded-xl py-3 px-2 text-center transition cursor-pointer">
            <div class="text-2xl mb-1">🛒</div>
            <div class="text-xs font-semibold text-gray-600">Buyer</div>
            <div class="text-xs text-gray-400 mt-0.5">Browse & bid</div>
          </button>
          <button onclick="selectRole('admin')" id="role-admin"
            class="flex-1 border-2 border-gray-200 bg-white rounded-xl py-3 px-2 text-center transition cursor-pointer">
            <div class="text-2xl mb-1">🛡️</div>
            <div class="text-xs font-semibold text-gray-600">Admin</div>
            <div class="text-xs text-gray-400 mt-0.5">Manage platform</div>
          </button>
        </div>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="px-7 pb-7">
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-700 mb-1.5">
            Phone number
            <span class="ml-1 bg-green-50 text-green-700 text-xs px-2 py-0.5 rounded-full border border-green-100">OTP verified</span>
          </label>
          <input type="tel" placeholder="+91 98765 43210" id="login-phone"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-900 outline-none focus:border-green-500 transition" />
        </div>
        <div class="mb-2">
          <label class="block text-xs font-medium text-gray-700 mb-1.5">Password</label>
          <input type="password" placeholder="Enter your password" id="login-password"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-900 outline-none focus:border-green-500 transition" />
        </div>
        <div class="text-right mb-5">
          <a href="#" class="text-xs text-green-600 hover:underline">Forgot password?</a>
        </div>
        <button id="login-btn"
          onclick="handleLogin()"
          class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl text-sm font-medium transition">
          Login as Farmer
        </button>
        <div class="flex items-center gap-3 my-4">
          <hr class="flex-1 border-gray-200" />
          <span class="text-xs text-gray-400">or</span>
          <hr class="flex-1 border-gray-200" />
        </div>
        <button class="w-full border border-green-600 text-green-600 hover:bg-green-50 py-2.5 rounded-xl text-sm transition">
          Login with OTP instead
        </button>
        <p class="text-center text-xs text-gray-500 mt-5">
          Don't have an account?
          <a href="#" onclick="switchTab('register')" class="text-green-600 font-medium hover:underline">Register here</a>
        </p>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" class="px-7 pb-7 hidden">
        <div class="flex gap-3 mb-4">
          <div class="flex-1">
            <label class="block text-xs font-medium text-gray-700 mb-1.5">First name</label>
            <input type="text" placeholder="Ramesh" id="reg-firstName"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-green-500 transition" />
          </div>
          <div class="flex-1">
            <label class="block text-xs font-medium text-gray-700 mb-1.5">Last name</label>
            <input type="text" placeholder="Kumar" id="reg-lastName"
              class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-green-500 transition" />
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-700 mb-1.5">Phone number</label>
          <input type="tel" placeholder="+91 98765 43210" id="reg-phone"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-green-500 transition" />
        </div>
        <div class="mb-4">
  <label class="block text-xs font-medium text-gray-700 mb-1.5">Email address</label>
  <input type="email" placeholder="ramesh@gmail.com" id="reg-email"
    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-green-500 transition" />
</div>
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-700 mb-1.5">State</label>
          <select class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-700 outline-none focus:border-green-500 transition bg-white" id="reg-state">
            <option value="">Select your state</option>
            <option>Uttar Pradesh</option>
            <option>Maharashtra</option>
            <option>Punjab</option>
            <option>Haryana</option>
            <option>Madhya Pradesh</option>
            <option>Rajasthan</option>
            <option>Bihar</option>
            <option>Gujarat</option>
            <option>Karnataka</option>
            <option>Tamil Nadu</option>
          </select>
        </div>
        <div class="mb-5">
          <label class="block text-xs font-medium text-gray-700 mb-1.5">Password</label>
          <input type="password" placeholder="Create a strong password" id="reg-password"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-green-500 transition" />
        </div>
        <button id="register-btn" onclick="handleRegister()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl text-sm font-medium transition">Register as Farmer</button>
        <p class="text-center text-xs text-gray-500 mt-5">
          Already have an account?
          <a href="#" onclick="switchTab('login')" class="text-green-600 font-medium hover:underline">Login here</a>
        </p>
      </div>

    </div>
  </main>

  <script>
    let currentRole = 'farmer';

    // Check URL param for role
    const params = new URLSearchParams(window.location.search);
    if (params.get('role')) selectRole(params.get('role'));

    function switchTab(tab) {
      const loginForm    = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const loginTab     = document.getElementById('login-tab');
      const registerTab  = document.getElementById('register-tab');
      const adminBtn     = document.getElementById('role-admin');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        loginTab.classList.add('text-green-600', 'bg-white', 'shadow-sm');
        loginTab.classList.remove('text-gray-500');
        registerTab.classList.remove('text-green-600', 'bg-white', 'shadow-sm');
        registerTab.classList.add('text-gray-500');
        // Show admin on login tab
        if (adminBtn) adminBtn.style.display = 'flex';
      } else {
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        registerTab.classList.add('text-green-600', 'bg-white', 'shadow-sm');
        registerTab.classList.remove('text-gray-500');
        loginTab.classList.remove('text-green-600', 'bg-white', 'shadow-sm');
        loginTab.classList.add('text-gray-500');
        // Hide admin on register tab
        if (adminBtn) adminBtn.style.display = 'none';
        // Auto select farmer when switching to register
        selectRole('farmer');
      }
    }

    function selectRole(role) {
      currentRole = role;
      const roles = ['farmer', 'buyer', 'admin'];
      const colors = {
        farmer: { border: 'border-green-500', bg: 'bg-green-50', text: 'text-green-700' },
        buyer:  { border: 'border-amber-500', bg: 'bg-amber-50', text: 'text-amber-700' },
        admin:  { border: 'border-blue-500',  bg: 'bg-blue-50',  text: 'text-blue-700'  },
      };
      const labels = { farmer: 'Farmer', buyer: 'Buyer', admin: 'Admin' };

      roles.forEach(r => {
        const btn = document.getElementById('role-' + r);
        const label = btn.querySelector('.text-xs.font-semibold');
        btn.className = 'flex-1 border-2 rounded-xl py-3 px-2 text-center transition cursor-pointer';
        if (r === role) {
          btn.classList.add(colors[r].border, colors[r].bg);
          label.className = 'text-xs font-semibold ' + colors[r].text;
        } else {
          btn.classList.add('border-gray-200', 'bg-white');
          label.className = 'text-xs font-semibold text-gray-600';
        }
      });

      // Update button text
      const roleName = labels[role];
      document.getElementById('login-btn').textContent = 'Login as ' + roleName;
      document.getElementById('register-btn').textContent = 'Register as ' + roleName;
    }
  </script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
