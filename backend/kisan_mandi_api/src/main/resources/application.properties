# Server
server.port=${PORT:8080}

# MongoDB — uses Atlas in production, local in development
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/kisanmandi}
spring.data.mongodb.database=kisanmandi

# JWT
jwt.secret=${JWT_SECRET:PrateekJWTSecret}
jwt.expiration=86400000

# App name
spring.application.name=kisan-mandi-api

# Disable Spring Security default login
spring.security.user.name=admin
spring.security.user.password=admin123

# File upload size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:prateeksinghpk129@gmail.com}
spring.mail.password=${MAIL_PASSWORD:HELLOHELLO}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Logging — disable debug in production
logging.level.org.springframework.data.mongodb=INFO